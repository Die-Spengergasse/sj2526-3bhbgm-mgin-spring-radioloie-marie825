<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patients List</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1>Liste der Reservierungen</h1>
    Für welches Gerät möchten sie alle Reservierungen sehen?
    <form method="get" action="/reservierung/list">
        <select name="deviceId" class="form-control">
            <option value="">-- Select a device --</option>
            <option th:each="d : ${devices}"
                    th:value="${d.id}"
                    th:text="${d.art}">
            </option>
        </select>
        <button type="submit" class="btn btn-primary">Show reservations</button>
    </form>

    <table class="table">
        <thead>
        <tr>
            <th>reservationDate</th>
            <th>reservationTime</th>
            <th>patient</th>
            <th>device</th>
            <th>bodyPart</th>
            <th>commentar</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${reservierung}">
            <td th:text="${r.reservationDate}"></td>
            <td th:text="${r.reservationTime}"></td>
            <td th:text="${r.patient.name + ' ' + r.patient.surname}"></td>
            <td th:text="${r.device.art}"></td>
            <td th:text="${r.bodyPart}"></td>
            <td th:text="${r.commentar}"></td>
        </tr>
        </tbody>
    </table>

    <p>
        <a href="/reservierung/add">new reservation</a>
    </p>
    <p>
        <a href="/">Back to homepage</a>
    </p>
</div>
</body>
</html>
